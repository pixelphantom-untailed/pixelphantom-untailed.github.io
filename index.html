<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abhi AI | Prism Axis APS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column; }

        /* --- Intro Animation --- */
        #intro-screen { position: fixed; inset: 0; background: #ffffff; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease-out; }
        .logo-box { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
        .logo-circle { position: absolute; width: 100%; height: 100%; border: 2px solid #f1f5f9; border-top: 2px solid #18181b; border-radius: 50%; animation: spin 1s cubic-bezier(0.76, 0, 0.24, 1) infinite; }
        .logo-letter { font-size: 2.2rem; font-weight: 800; color: #18181b; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Main UI --- */
        #app-content { display: none; flex-direction: column; height: 100%; opacity: 0; transition: opacity 0.5s ease-in; flex: 1; }
        header { width: 100%; padding: 1.25rem; text-align: center; position: relative; background: white; border-bottom: 1px solid #f8fafc; flex-shrink: 0; }

        #settings-trigger { position: absolute; right: 1.25rem; top: 50%; transform: translateY(-50%); font-size: 1.1rem; color: #cbd5e1; cursor: pointer; padding: 0.5rem; }

        /* --- Settings --- */
        #settings-panel { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
        .settings-card { background: white; padding: 2rem; border-radius: 2rem; box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05); width: 100%; max-width: 400px; border: 1px solid #f1f5f9; }

        /* --- Chat area --- */
        .chat-container { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; width: 100%; max-width: 800px; margin: 0 auto; scrollbar-width: none; }
        .msg { max-width: 85%; padding: 1rem 1.25rem; border-radius: 1.4rem; font-size: 0.95rem; line-height: 1.6; animation: slideUp 0.3s ease-out; white-space: pre-wrap; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { background: #f8fafc; color: #1e293b; align-self: flex-end; border-bottom-right-radius: 0.3rem; border: 1px solid #f1f5f9; }
        .ai-msg { background: white; color: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 0.3rem; border: 1px solid #f1f5f9; }
        
        /* --- FIXED INPUT AREA --- */
        .input-section { width: 100%; background: white; border-top: 1px solid #f8fafc; padding: 1rem 1.5rem 2.5rem 1.5rem; flex-shrink: 0; }
        .input-max-width { max-width: 800px; margin: 0 auto; }
        .input-wrapper { display: flex; gap: 10px; align-items: center; border: 1px solid #f1f5f9; padding: 6px; border-radius: 1.75rem; background: #f8fafc; }
        .text-input { flex: 1; background: transparent; border: none; padding: 0.75rem 1.25rem; outline: none; font-size: 0.95rem; color: #1e293b; width: 100%; }
        .send-btn { background: #18181b; color: white; width: 2.8rem; height: 2.8rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
    </style>
</head>

        <div class="logo-box"><div class="logo-circle"></div><span class="logo-letter">A</span></div>
    </div>

    <div id="settings-panel">
        <div class="settings-card">
            <h2 class="text-xl font-extrabold mb-1">System Setup</h2>
            <p class="text-xs text-slate-500 mb-6">Enter your API key for unlimited neural access.</p>
            <input type="password" id="apiKeyInput" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3.5 text-sm mb-4 outline-none focus:border-slate-300" placeholder="Paste Key Here">
            <button id="saveKey" class="w-full bg-black text-white py-3.5 rounded-xl font-bold text-xs uppercase tracking-widest">Activate Access</button>
        </div>
    </div>

    <div id="app-content">
        <header>
            <h1 class="text-lg font-extrabold tracking-tight">Abhi AI</h1>
            <p class="text-[8px] uppercase tracking-[0.4em] text-slate-400 font-bold">By Abhinit Prakash Shelekar</p>
            <div id="settings-trigger"><i class="fas fa-cog"></i></div>
        </header>

        <main id="chatBox" class="chat-container"></main>

        <div class="input-section">

                <div class="input-wrapper">
                    <input type="text" id="userInput" class="text-input" placeholder="Message Abhi AI...">
                    <div id="sendBtn" class="send-btn"><i class="fas fa-arrow-up"></i></div>
                </div>
                <div class="flex justify-between items-center mt-4 px-2">
                    <p class="text-[7px] text-slate-300 font-bold uppercase tracking-[0.3em]">Neural Interface</p>
                    <p class="text-[7px] text-slate-400 font-bold uppercase tracking-[0.2em]">© Prism Axis APS</p>
                </div>
            </div>
        </div>
    </div>
