    <div id="intro-screen"><div class="logo-box"><div class="logo-circle"></div><span class="logo-letter">A</span></div></div>

        <main id="chatBox" class="chat-container"></main>
        <div id="typing" class="typing-indicator">Thinking...</div>

        <div class="input-section">
            <div class="input-max-width">
                <div class="input-wrapper">
                    <input type="text" id="userInput" class="text-input" placeholder="Ask anything..." autocomplete="off">
                    <div id="sendBtn" class="send-btn"><i class="fas fa-arrow-up"></i></div>
                </div>
                <div class="flex justify-between items-center mt-4 px-2">
                    <p class="text-[7px] text-slate-300 font-bold uppercase tracking-[0.3em]">Neural Link Stable</p>
                    <p class="text-[7px] text-slate-400 font-bold uppercase tracking-[0.2em]">© 2026 ABHINIT PRAKASH SHELEKAR</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // Set by environment
        const systemPrompt = `You are Abhi AI, a highly intelligent neural interface. 
        IMPORTANT RULES:
        1. Be concise. Provide ONLY the direct answer to the user's request. 
        2. DO NOT introduce yourself or mention your creator unless explicitly asked.
        3. If (and ONLY if) asked about your origin or creator, state that you were developed by Abhinit Prakash Shelekar, founder of Prism Axis APS.
        4. If (and ONLY if) asked for a description of yourself or the company, explain that Prism Axis APS is an advanced development hub for next-gen AI technologies.`;

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-screen').style.display = 'none';
                    const app = document.getElementById('app-content');
                    app.style.display = 'flex';
                    setTimeout(() => {
                        app.style.opacity = '1';
                        addMsg("How can I assist you today?", false);
                    }, 50);
                }, 600);
            }, 800);
        };

        async function getAIResponse(userQuery) {
            const typing = document.getElementById('typing');
            typing.style.display = 'block';
            
            let retries = 0;
            const maxRetries = 5;
            
            const fetchWithRetry = async (delay) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
                } catch (error) {
                    if (retries < maxRetries) {
                        retries++;
                        await new Promise(res => setTimeout(res, delay));
                        return fetchWithRetry(delay * 2);
                    }
                    return "Connection error. Please try again.";
                }
            };

            const responseText = await fetchWithRetry(1000);
            typing.style.display = 'none';
            addMsg(responseText, false);
        }

        function addMsg(text, isUser) {
            const container = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user-msg' : 'ai-msg'}`;
            div.innerText = text;
            container.appendChild(div);
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        const handleSend = () => {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (val) {
                addMsg(val, true);
                input.value = '';
                getAIResponse(val);
            }
        };

        document.getElementById('sendBtn').onclick = handleSend;
        document.getElementById('userInput').onkeydown = (e) => { if (e.key === 'Enter') handleSend(); };
    </script>
</body>
