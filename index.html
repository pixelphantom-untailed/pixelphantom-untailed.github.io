

    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhi AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { 
            background-color: #ffffff; 
            color: #1a1a1a; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* --- Clean Light Intro Animation --- */
        #intro-screen {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease-out;
        }

        .logo-box {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid #f4f4f5;
            border-top: 3px solid #18181b;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.76, 0, 0.24, 1) infinite;
        }

        .logo-letter {
            font-size: 2.5rem;
            font-weight: 800;
            color: #18181b;
            animation: breathe 2s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.95); opacity: 0.7; }
        }

        /* --- Main App UI --- */
        #app-content {
            display: none;
            flex-direction: column;
            height: 100%;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        header { 
            width: 100%; 
            padding: 1.25rem; 
            border-bottom: 1px solid #f1f5f9; 
            text-align: center; 
            position: relative;
        }

        #settings-trigger {
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s, transform 0.3s;
        }
        #settings-trigger:hover { color: #18181b; transform: translateY(-50%) rotate(45deg); }

        /* --- Settings Overlay --- */
        #settings-panel {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            animation: fadeIn 0.3s ease-out;
        }

        .settings-card {
            background: white;
            padding: 2.5rem;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 450px;
            border: 1px solid #f1f5f9;
        }

        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 2rem 1rem; 
            display: flex; 
            flex-direction: column; 
            gap: 1.5rem; 
            width: 100%; 
            max-width: 700px; 
            margin: 0 auto;
            scrollbar-width: none;
        }
        .chat-container::-webkit-scrollbar { display: none; }

        .msg { 
            max-width: 85%; 
            padding: 1rem 1.25rem; 
            border-radius: 1.25rem; 
            font-size: 0.95rem; 
            line-height: 1.5; 
            animation: slideUp 0.3s ease-out;
            white-space: pre-wrap;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .user-msg { background: #f4f4f5; align-self: flex-end; border-bottom-right-radius: 0.25rem; }
        .ai-msg { background: white; border: 1px solid #e4e4e7; align-self: flex-start; border-bottom-left-radius: 0.25rem; }

        .loader { display: flex; gap: 4px; padding: 12px; align-self: center; }
        .dot { width: 6px; height: 6px; background: #cbd5e1; border-radius: 50%; animation: pulse 1s infinite alternate; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { from { opacity: 0.3; } to { opacity: 1; } }

        .input-area { width: 100%; max-width: 700px; padding: 1.5rem; background: white; margin: 0 auto; }
        .input-wrapper { display: flex; gap: 12px; align-items: center; border: 1px solid #f1f5f9; padding: 6px; border-radius: 1.5rem; background: #f8fafc; }
        
        .text-input { flex: 1; background: transparent; border: none; padding: 0.75rem 1rem; outline: none; font-size: 0.95rem; }
        .send-btn { background: #18181b; color: white; width: 2.8rem; height: 2.8rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; }
    </style>
</head>
<body>
    <!-- Intro -->
    <div id="intro-screen">
        <div class="logo-box">
            <div class="logo-circle"></div>
            <span class="logo-letter">A</span>
        </div>
        <p class="mt-8 text-[0.7rem] uppercase tracking-[0.4em] text-slate-400 font-bold">Initializing</p>
    </div>

    <!-- Settings Overlay -->
    <div id="settings-panel">
        <div class="settings-card">
            <h2 class="text-xl font-extrabold mb-2">Unlimited Access</h2>
            <p class="text-sm text-slate-500 mb-8 leading-relaxed">To enjoy unlimited usage and faster response times, please enter your own Google API Key below. Your key is stored locally in your browser.</p>
            
            <div class="mb-6">
                <label class="block text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-2">Google API Key</label>
                <input type="password" id="apiKeyInput" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 outline-none focus:border-black transition-colors" placeholder="Enter your key here...">
            </div>

            <div class="flex gap-3">
                <button id="saveKey" class="flex-1 bg-black text-white py-3 rounded-xl font-bold text-sm transition-transform active:scale-95">Save Key</button>
                <button id="closeSettings" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-sm">Close</button>
            </div>
            
            <p class="mt-6 text-[9px] text-center text-slate-400 leading-normal">
                Don't have a key? Get one at <a href="https://aistudio.google.com/app/apikey" target="_blank" class="underline hover:text-black">Google AI Studio</a>.
            </p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app-content">
        <header>
            <h1 class="text-lg font-extrabold tracking-tight">Abhi AI</h1>
            <p class="text-[8px] uppercase tracking-[0.4em] text-slate-400 font-bold">Neural Interface</p>
            <div id="settings-trigger"><i class="fas fa-cog"></i></div>
        </header>

        <main id="chatBox" class="chat-container"></main>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" class="text-input" placeholder="Message Abhi AI...">
                <div id="sendBtn" class="send-btn"><i class="fas fa-arrow-up"></i></div>
            </div>
            <p class="text-[8px] text-center text-slate-300 mt-4 font-bold uppercase tracking-[0.3em]">Proprietary Neural System</p>
        </div>
    </div>

    <script>
        const SYSTEM_KEY = ""; // Fallback key
        const TEXT_MODEL = "gemini-2.5-flash-preview-09-2025";
        let loader = null;

        const DEV_BIO = `Abhinit Prakash Shelekar is a young software developer, system architect, and student based in Amravati, Maharashtra. 

He has gained recognition for his technical contributions and academic achievements, notably winning second prize in the senior category at the "Mai Bhi Scientist 4.0" event at Tapadia City Centre. His work spans several complex areas of technology and design:

Key Projects & Technical Focus:
• Abhi AI: A personalized LLM interface built using React and his own Neural X interface.
• Abhi EcoSort: An AI-driven waste management application designed to categorize and identify recyclable materials through visual recognition.
• Abhi Developments: His personal brand identity focused on full-stack development, utilizing technologies like Java, Python, React, and Tailwind CSS.
• Minimalist Design: He is known for a "premium" design aesthetic, often incorporating Apple-inspired visuals and glassmorphism into his software interfaces.`;

        // Boot Sequence
        window.onload = () => {
            const savedKey = localStorage.getItem('user_abhi_api_key');
            if(savedKey) document.getElementById('apiKeyInput').value = savedKey;

            setTimeout(() => {
                const intro = document.getElementById('intro-screen');
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                    const app = document.getElementById('app-content');
                    app.style.display = 'flex';
                    setTimeout(() => app.style.opacity = '1', 50);
                    addMsg("Abhi AI Synchronized. How can I assist you today?", false);
                }, 600);
            }, 2000);
        };

        // Settings Logic
        document.getElementById('settings-trigger').onclick = () => {
            document.getElementById('settings-panel').style.display = 'flex';
        };

        document.getElementById('closeSettings').onclick = () => {
            document.getElementById('settings-panel').style.display = 'none';
        };

        document.getElementById('saveKey').onclick = () => {
            const key = document.getElementById('apiKeyInput').value.trim();
            if(key) {
                localStorage.setItem('user_abhi_api_key', key);
                addMsg("System: Private API key saved successfully.", false);
            } else {
                localStorage.removeItem('user_abhi_api_key');
                addMsg("System: Reverted to default shared access.", false);
            }
            document.getElementById('settings-panel').style.display = 'none';
        };

        async function getResponse(prompt) {
            showLoader();
            const activeKey = localStorage.getItem('user_abhi_api_key') || SYSTEM_KEY;
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${activeKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: `Your name is Abhi AI. Developed by Abhinit Shelekar. 
                        
                        1. DO NOT mention the developer in standard conversation.
                        2. If asked about your origins or specifically about 'Abhinit Shelekar', reply with exactly this:
                        ${DEV_BIO}
                        
                        Professional tone. Concise answers.` }] }
                    })
                });
                const data = await response.json();
                hideLoader();
                
                if (data.error) throw new Error(data.error.message);
                
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) addMsg(text, false);
            } catch (e) {
                hideLoader();
                addMsg(`Core Error: ${e.message}. Check your API key in settings.`, false);
            }
        }

        function showLoader() {
            loader = document.createElement('div');
            loader.className = 'loader';
            loader.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            document.getElementById('chatBox').appendChild(loader);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }

        function hideLoader() { if(loader) loader.remove(); }

        const addMsg = (t, u) => {
            const d = document.createElement('div');
            d.className = `msg ${u ? 'user-msg' : 'ai-msg'}`;
            d.innerText = t;
            const cb = document.getElementById('chatBox');
            cb.appendChild(d);
            cb.scrollTop = cb.scrollHeight;
        };

        document.getElementById('sendBtn').onclick = () => {
            const v = document.getElementById('userInput').value;
            if(v.trim()){
                addMsg(v, true);
                getResponse(v);
                document.getElementById('userInput').value = '';
            }
        };

        document.getElementById('userInput').onkeydown = (e) => { if(e.key === 'Enter') document.getElementById('sendBtn').click(); };
    </script>
</body>
</html>
