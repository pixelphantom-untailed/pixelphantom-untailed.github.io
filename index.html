<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhi AI | Prism Axis APS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; margin: 0; overflow: hidden; }

        /* --- Intro Animation --- */
        #intro-screen { position: fixed; inset: 0; background: #ffffff; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease-out; }
        .logo-box { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
        .logo-circle { position: absolute; width: 100%; height: 100%; border: 2px solid #f1f5f9; border-top: 2px solid #18181b; border-radius: 50%; animation: spin 1s cubic-bezier(0.76, 0, 0.24, 1) infinite; }
        .logo-letter { font-size: 2.2rem; font-weight: 800; color: #18181b; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Main UI --- */
        #app-content { display: none; flex-direction: column; height: 100%; opacity: 0; transition: opacity 0.5s ease-in; }
        header { width: 100%; padding: 1.5rem; text-align: center; position: relative; background: white; z-index: 10; border-bottom: 1px solid #f8fafc; }

        #settings-trigger { position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%); font-size: 1.1rem; color: #cbd5e1; cursor: pointer; transition: all 0.2s; padding: 0.5rem; }
        #settings-trigger:hover { color: #18181b; }

        /* --- Settings Panel --- */
        #settings-panel { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
        .settings-card { background: white; padding: 2.25rem; border-radius: 2rem; box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05); width: 100%; max-width: 400px; border: 1px solid #f1f5f9; }

        /* --- Chat area --- */
        .chat-container { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; width: 100%; max-width: 800px; margin: 0 auto; scrollbar-width: none; }
        .chat-container::-webkit-scrollbar { display: none; }
        .msg { max-width: 85%; padding: 1rem 1.25rem; border-radius: 1.4rem; font-size: 0.95rem; line-height: 1.6; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); white-space: pre-wrap; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .user-msg { background: #f8fafc; color: #1e293b; align-self: flex-end; border-bottom-right-radius: 0.3rem; border: 1px solid #f1f5f9; }
        .ai-msg { background: white; color: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 0.3rem; border: 1px solid #f1f5f9; }
        
        /* --- Input Area --- */
        .input-area { width: 100%; max-width: 800px; padding: 1.5rem; background: white; margin: 0 auto; }
        .input-wrapper { display: flex; gap: 10px; align-items: center; border: 1px solid #f1f5f9; padding: 6px; border-radius: 1.75rem; background: #f8fafc; }
        .text-input { flex: 1; background: transparent; border: none; padding: 0.75rem 1.25rem; outline: none; font-size: 0.95rem; color: #1e293b; }
        .send-btn { background: #18181b; color: white; width: 2.8rem; height: 2.8rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>
    <div id="intro-screen">
        <div class="logo-box">
            <div class="logo-circle"></div>
            <span class="logo-letter">A</span>
        </div>
    </div>

    <div id="settings-panel">
        <div class="settings-card">
            <h2 class="text-xl font-extrabold mb-1">System Setup</h2>
            <p class="text-xs text-slate-500 mb-8">Enter your API key for unlimited neural access.</p>
            <div class="mb-6">
                <label class="block text-[9px] uppercase tracking-widest text-slate-400 font-bold mb-2">Google Gemini API Key</label>
                <input type="password" id="apiKeyInput" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3.5 text-sm outline-none focus:border-slate-300 transition-all" placeholder="Paste key here...">
            </div>
            <div class="flex gap-3">
                <button id="saveKey" class="flex-1 bg-black text-white py-3.5 rounded-xl font-bold text-xs uppercase tracking-widest">Activate Access</button>
            </div>
        </div>
    </div>

    <div id="app-content">
        <header>
            <h1 class="text-lg font-extrabold tracking-tight">Abhi AI</h1>
            <p class="text-[8px] uppercase tracking-[0.4em] text-slate-400 font-bold">By Abhinit Prakash Shelekar</p>
            <div id="settings-trigger"><i class="fas fa-cog"></i></div>
        </header>

        <main id="chatBox" class="chat-container"></main>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" class="text-input" placeholder="Message Abhi AI...">
                <div id="sendBtn" class="send-btn"><i class="fas fa-arrow-up"></i></div>
            </div>
            <div class="mt-4 text-center">
                <p class="text-[7px] text-slate-300 font-bold uppercase tracking-[0.3em]">Neural Interface • Prism Axis APS</p>
            </div>
        </div>
    </div>

    <script>
        const TEXT_MODEL = "gemini-2.0-flash";

        window.onload = () => {
            const savedKey = localStorage.getItem('user_abhi_api_key');
            
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('intro-screen').style.display = 'none';
                    const app = document.getElementById('app-content');
                    app.style.display = 'flex';
                    setTimeout(() => {
                        app.style.opacity = '1';
                        // THE FRIENDLY GREETING YOU WANTED BACK
                        if(!savedKey) {
                            addMsg("Welcome! To get unlimited access and start chatting, please tap the gear icon in the top right and enter your Google API key.", false);
                        } else {
                            addMsg("Neural Interface Synchronized. How can I help you today?", false);
                        }
                    }, 50);
                }, 600);
            }, 1500);
        };

        // UI Controls
        document.getElementById('settings-trigger').onclick = () => document.getElementById('settings-panel').style.display = 'flex';
        
        document.getElementById('saveKey').onclick = () => {
            const key = document.getElementById('apiKeyInput').value.trim();
            if(key) {
                localStorage.setItem('user_abhi_api_key', key);
                document.getElementById('settings-panel').style.display = 'none';
                addMsg("System: Access granted. Neural link established.", false);
            }
        };

        async function getResponse(prompt) {
            const activeKey = localStorage.getItem('user_abhi_api_key');
            if(!activeKey) {
                addMsg("Access Denied: Please enter your API key in settings to continue.", false);
                return;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${activeKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "You are Abhi AI, a premium assistant created by Abhinit Prakash Shelekar." }] }
                    })
                });
                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (text) addMsg(text, false);
            } catch (e) {
                addMsg("Connection failed. Please check your key or internet.", false);
            }
        }

        function addMsg(t, u) {
            const d = document.createElement('div');
            d.className = `msg ${u ? 'user-msg' : 'ai-msg'}`;
            d.innerText = t;
            const cb = document.getElementById('chatBox');
            cb.appendChild(d);
            cb.scrollTop = cb.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = () => {
            const v = document.getElementById('userInput').value;
            if(v.trim()){
                addMsg(v, true);
                getResponse(v);
                document.getElementById('userInput').value = '';
            }
        };

        document.getElementById('userInput').onkeydown = (e) => { if(e.key === 'Enter') document.getElementById('sendBtn').click(); };
    </script>
</body>
</html>
